services:

  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: zlp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zlp_messenger}
      POSTGRES_USER: ${POSTGRES_USER:-zlp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zlp_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zlp} -d ${POSTGRES_DB:-zlp_messenger}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zlp_redis
    restart: unless-stopped
    command: redis-server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: zlp_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: zlp_nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  # ── Application ─────────────────────────────────────────────

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zlp_backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      NATS_URL: nats://nats:4222
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: zlp_web
    restart: unless-stopped
    depends_on:
      - backend

  # ── Reverse proxy ────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: zlp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - backend
      - web
    # Генерируем самоподписанный сертификат если его нет
    entrypoint: ["/bin/sh", "-c", "if [ ! -f /etc/nginx/certs/selfsigned.crt ]; then apk add --no-cache openssl && mkdir -p /etc/nginx/certs && openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /etc/nginx/certs/selfsigned.key -out /etc/nginx/certs/selfsigned.crt -subj '/CN=zlp-messenger/O=ZLP/C=RU'; fi && nginx -g 'daemon off;'"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_certs:
