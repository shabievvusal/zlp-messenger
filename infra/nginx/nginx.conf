events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8080;
    }

    upstream web {
        server web:80;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name _;

        # Самоподписанный сертификат (генерируется при старте контейнера)
        ssl_certificate     /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;

        # Media files (proxied from MinIO so browser can reach internal Docker host)
        location /media/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host minio;
            proxy_buffering off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Media file streaming — disable buffering so byte-range audio/video works properly
        location /api/media/file/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_read_timeout 120s;
        }

        # API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # WebSocket
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Health check
        location /health {
            proxy_pass http://backend;
        }

        # Frontend
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
        }
    }
}
