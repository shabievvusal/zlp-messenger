listening-port=3478
fingerprint
lt-cred-mech
realm=zlp-messenger
user=zlp:zlp_turn_secret

# !! ОБЯЗАТЕЛЬНО: укажи публичный IP сервера !!
# Без этого relay-кандидаты будут неправильными и TURN не будет работать
# external-ip=82.25.12.165

# UDP relay port range (открой эти порты в фаерволе!)
min-port=49152
max-port=65535

# Disable TLS
no-tls
no-dtls

log-file=/var/log/coturn/turnserver.log
simple-log
no-loopback-peers
no-multicast-peers
no-cli
