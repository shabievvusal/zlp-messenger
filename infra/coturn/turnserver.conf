listening-port=3478
fingerprint
lt-cred-mech
realm=zlp-messenger
user=zlp:zlp_turn_secret

# UDP relay port range (open these in the firewall!)
min-port=49152
max-port=65535

# Disable TLS — nginx handles SSL termination
no-tls
no-dtls

log-file=/var/log/coturn/turnserver.log
simple-log
no-loopback-peers
no-multicast-peers
no-cli
